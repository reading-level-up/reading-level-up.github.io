    function loadNaverMaps(clientId) {
        if (window.naver?.maps) return Promise.resolve(window.naver.maps);

        window.__readingNaverMapsPromise = new Promise((resolve, reject) => {
            const callbackName = "__readingNaverMapsReady";
            let timeoutId;
            let pollId;
            let settled = false;
            const previousAuthFailure = window.navermap_authFailure;

            const cleanup = () => {
                if (timeoutId) window.clearTimeout(timeoutId);
                if (pollId) window.clearTimeout(pollId);
                // navermap_authFailure 가 여전히 우리 핸들러일 때만 복원/삭제 (다른 사용자 영향 X)
                if (window.navermap_authFailure === ourAuthFailure) {

                        window.navermap_authFailure = previousAuthFailure;
                    } else {
                        try { delete window.navermap_authFailure; } catch (e) { window.navermap_authFailure = undefined; }
                    }
                }
                try { delete window[callbackName]; } catch (e) { window[callbackName] = undefined; }
            };

            const finish = (action) => {
                if (settled) return;
                settled = true;
                cleanup();
                action();
            };

            const waitForMapsNamespace = () => {
                if (settled) return;
                if (window.naver?.maps) {
                    finish(() => resolve(window.naver.maps));
                    return;
                }
                pollId = window.setTimeout(waitForMapsNamespace, 25);
            };

            // 우리가 등록한 auth failure handler — cleanup 시 우리 것만 정리
            const ourAuthFailure = () => {
                finish(() => reject(new Error("NAVER Maps authentication failure (domain whitelist / ncpKeyId)")));
            };

            // SDK 로드 전 인증 실패 핸들러 등록 (공식 문서 패턴)
            window.navermap_authFailure = ourAuthFailure;

            timeoutId = window.setTimeout(() => {

            window[callbackName] = () => {

            io.observe(ref.current);
            return () => io.disconnect();
        }, []);
        return [ref, visible];

    function Consult({ accent, naverUrl, kakaoChannelId, kakaoFallbackUrl }) {
        const [step, setStep] = useState(1);
        const [data, setData] = useState({ name: "", grade: "", concern: "", phone: "", time: "" });
        const [agreed, setAgreed] = useState(false);
        const [submitStatus, setSubmitStatus] = useState("idle"); // idle | submitting | submitted
        const submitTimerRef = useRef(null);
        const total = 3;
        const m = useMobile();

        // submitted 전환 타이머 정리 — 카드 재진입/reset 시 race 차단
        const clearSubmitTimer = () => {
            if (submitTimerRef.current) {
                clearTimeout(submitTimerRef.current);
                submitTimerRef.current = null;
            }
        };

        // Programs 카드 클릭 시 학년 사전 선택 (CustomEvent)
        // 이전 제출 완료 상태(submitted)였더라도 새 시도로 리셋해 버튼이 막히지 않게 함.
        // 또한 진행 중인 250ms 타이머가 있으면 정리해 race 방지.
        useEffect(() => {
            const handler = (e) => {
                clearSubmitTimer();
                setData(d => ({ ...d, grade: e.detail, concern: "" }));
                setStep(1);
                setSubmitStatus("idle");
            };
            window.addEventListener('preselectGrade', handler);
            return () => {
                window.removeEventListener('preselectGrade', handler);
                clearSubmitTimer(); // unmount cleanup
            };
        }, []);

        const update = (k, v) => setData((d) => ({ ...d, [k]: v }));

        // 전화 자동 포매팅 (010-XXXX-XXXX)
        const formatPhone = (raw) => {
            const v = raw.replace(/\D/g, '').slice(0, 11);
            if (v.length <= 3) return v;
            if (v.length <= 7) return v.slice(0, 3) + '-' + v.slice(3);
            return v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7);
        };
        // 010 휴대폰 4-4 자리 strict (안내 문구와 일치)
        const phoneValid = /^010-\d{4}-\d{4}$/.test(data.phone);
        // 한 번 제출 후 중복 접수 방지 — idle 일 때만 활성
        const canSubmit = phoneValid && agreed && submitStatus === "idle";

        const sendToWebhook = () => {
            const payload = {
                name: data.name,
                grade: data.grade,
                phone: data.phone,
                date: "",
                time: data.time,
                datetime: data.time,
                message: data.concern,
                timestamp: new Date().toISOString(),
            };
            try {
                fetch(WEBHOOK_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                }).catch((err) => console.warn("webhook error:", err));
            } catch (err) {
                console.warn("webhook sync error:", err);
            }
        };

        // CRITICAL: window.open 은 사용자 제스처(click) 안에서 동기 호출해야 popup 차단 회피.
        // setTimeout 안에서 호출하면 비동기로 인식되어 브라우저가 차단 가능.
        const handleSubmit = (channel) => {
            if (!canSubmit) return;

            // 1) 외부 이동 즉시 (사용자 제스처 동기 호출) — popup 차단 회피
            if (channel === "kakao") {
                if (window.Kakao?.Channel?.chat) {
                    try {
                        window.Kakao.Channel.chat({ channelPublicId: kakaoChannelId });
                    } catch (e) {
                        console.warn("Kakao.Channel.chat failed:", e);
                        window.open(kakaoFallbackUrl, "_blank", "noopener");
                    }
                } else {
                    window.open(kakaoFallbackUrl, "_blank", "noopener");
                }
            } else {
                window.open(naverUrl, "_blank", "noopener");
            }

            // 2) webhook 비동기 fire-and-forget (popup 차단과 무관)
            setSubmitStatus("submitting");
            sendToWebhook();
            // 3) 시각 피드백 — "전송 시도" 상태 표시 (응답 확인 불가, 정직 표현)
            //    timer ref 로 추적 → 카드 재진입/reset 시 cleanup
            clearSubmitTimer();
            submitTimerRef.current = setTimeout(() => setSubmitStatus("submitted"), 250);
        };
        const submitToKakao = () => handleSubmit("kakao");
        const submitToNaver = () => handleSubmit("naver");

        return (
            <div id="consult" style={{ background: "var(--vb-ink)", color: "var(--vb-bg)", padding: m ? "80px 20px" : "120px 40px", position: "relative", overflow: "hidden" }}>

    /* ─────────────── LOCATION ─────────────── */
    function Location({ accent, naverUrl, kakaoChannelId, kakaoFallbackUrl }) {
        const m = useMobile();
        const mapRef = useRef(null);
        const [mapFailed, setMapFailed] = useState(false);

        useEffect(() => {
            let cancelled = false;

            loadNaverMaps(NAVER_MAP_CLIENT_ID)
                .then((maps) => {
                    if (cancelled || !mapRef.current) return;

                    const center = new maps.LatLng(NAVER_MAP_POSITION.lat, NAVER_MAP_POSITION.lng);
                    const map = new maps.Map(mapRef.current, {
                        center,
                        zoom: 17,
                        zoomControl: true,
                        zoomControlOptions: { position: maps.Position.TOP_LEFT },
                        scaleControl: false,
                        mapDataControl: false,
                        mapTypeControl: false,
                    });

                    const marker = new maps.Marker({
                        position: center,
                        map,
                        title: BIZ.name,
                    });

                    const infoWindow = new maps.InfoWindow({
                        content: `
                            <a href="${naverUrl}" target="_blank" rel="noopener noreferrer" style="display:block;min-width:190px;padding:12px 14px;text-decoration:none;color:#1D3A2A;font-family:Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;">
                                <strong style="display:block;font-size:13px;margin-bottom:4px;">${BIZ.name}</strong>
                                <span style="display:block;font-size:12px;color:#526158;line-height:1.45;">네이버 플레이스에서 보기</span>
                            </a>
                        `,
                        borderWidth: 0,
                        anchorSize: new maps.Size(12, 10),
                        backgroundColor: "#FFFFFF",
                    });

                    infoWindow.open(map, marker);
                    maps.Event.addListener(marker, "click", () => {
                        window.open(naverUrl, "_blank", "noopener");
                    });
                })
                .catch((error) => {
                    console.warn("NAVER Maps load failed:", error);
                    if (!cancelled) setMapFailed(true);
                });

            return () => { cancelled = true; };
        }, [naverUrl]);

        const openKakaoChat = () => {
            if (window.Kakao?.Channel?.chat) {
                try {
                    window.Kakao.Channel.chat({ channelPublicId: kakaoChannelId });
                    return;
                } catch (e) {
                    console.warn("Kakao.Channel.chat failed:", e);
                }
            }
            window.open(kakaoFallbackUrl, "_blank", "noopener");
        };
        return (
            <div id="location" style={{ background: "var(--vb-paper)", padding: m ? "72px 20px" : "100px 40px", borderTop: "1px solid var(--vb-line)" }}>
                <div style={{ maxWidth: 1240, margin: "0 auto", display: "grid", gridTemplateColumns: m ? "1fr" : "1fr 1.1fr", gap: m ? 28 : 60, alignItems: "center" }}>
                    <Reveal>
                        <div>
                            <div className="mono" style={{ fontSize: 11, color: accent, letterSpacing: "0.25em", marginBottom: 20 }}>
                                VISIT — 오시는 길
                            </div>
                            <h2 className="display" style={{ fontSize: m ? "clamp(26px, 7vw, 38px)" : 48, lineHeight: 1.2, margin: 0, marginBottom: 24 }}>
                                용수초에서<br />
                                <em style={{ fontStyle: "italic", color: accent }}>건널목 하나.</em>
                            </h2>
                            <p style={{ fontSize: m ? 14 : 15, lineHeight: 1.85, color: "var(--vb-ink-2)", margin: 0, marginBottom: 24 }}>
                                현대2차아파트 단지 내에 있어, 용수초 학생이라면
                                건널목 하나만 건너 단지 내 통로로 곧장 연결됩니다.
                                크게 돌아갈 필요 없이 <strong>도보 1–2분</strong> 거리예요.
                            </p>
                            <div style={{ fontSize: m ? 13 : 15, lineHeight: 2, color: "var(--vb-ink-2)", borderTop: "1px solid var(--vb-line)", paddingTop: 16 }}>
                                <strong>주소</strong> &nbsp; {BIZ.address}<br />
                                <span style={{ paddingLeft: 56, opacity: 0.8, fontSize: m ? 12 : 13 }}>{BIZ.addressDetail}</span><br />
                                <strong>연락</strong> &nbsp; {BIZ.phone}<br />
                                <strong>운영</strong> &nbsp; {BIZ.hours[0]}<br />
                                <span style={{ paddingLeft: 56 }}>{BIZ.hours[1]}</span>
                            </div>
                            <div style={{ display: "flex", gap: 10, marginTop: 28, flexWrap: "wrap" }}>
                                <a href={naverUrl} target="_blank" rel="noopener noreferrer" style={{ background: "var(--vb-ink)", color: "white", textDecoration: "none", padding: "14px 20px", fontSize: 13, fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 10 }}>
                                    <span style={{ background: "#03C75A", color: "white", padding: "2px 6px", borderRadius: 2, fontSize: 10, letterSpacing: "0.05em" }}>N</span>
                                    네이버 지도

                                <button type="button" onClick={openKakaoChat} style={{ background: "#FEE500", color: "#191919", border: "none", padding: "14px 20px", fontSize: 13, fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 8, cursor: "pointer", fontFamily: "inherit" }}>
                                    💬 1:1 카카오 문의
                                </button>
                                <a href={`tel:${BIZ.phoneRaw}`} style={{ background: "transparent", color: "var(--vb-ink)", textDecoration: "none", padding: "14px 20px", fontSize: 13, fontWeight: 600, border: "1px solid var(--vb-ink)" }}>
                                    ☎ 전화
                                </a>
                            </div>
                        </div>
                    </Reveal>
                    <Reveal delay={150}>
                        <div style={{ position: "relative", aspectRatio: m ? "4/3" : "5/4", background: "var(--vb-bg)", border: "1px solid var(--vb-line)", overflow: "hidden" }}>
                            <div
                                ref={mapRef}
                                role="region"
                                aria-label="리드인 화명 용수초점 위치 지도"
                                style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}
                            />
                            {mapFailed && (
                                <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", padding: 24, textAlign: "center", background: "var(--vb-bg)", color: "var(--vb-ink-2)", fontSize: 13, lineHeight: 1.8 }}>
                                    <div>
                                        네이버 지도를 불러오지 못했습니다.<br />
                                        <a href={naverUrl} target="_blank" rel="noopener noreferrer" style={{ color: "var(--vb-ink)", fontWeight: 700 }}>
                                            네이버 플레이스에서 위치 보기
                                        </a>
                                    </div>
                                </div>
                            )}
                            <a href={naverUrl} target="_blank" rel="noopener noreferrer" style={{ position: "absolute", top: 16, right: 16, background: "white", padding: "8px 12px", fontSize: 11, fontWeight: 600, textDecoration: "none", color: "var(--vb-ink)", display: "flex", alignItems: "center", gap: 6, boxShadow: "0 4px 12px rgba(0,0,0,0.15)" }}>
                                <span style={{ background: "#03C75A", color: "white", padding: "1px 5px", borderRadius: 2, fontSize: 9 }}>N</span>
                                네이버 플레이스에서 보기 →
                            </a>
                        </div>
                    </Reveal>
                </div>
            </div>
        );
    }
